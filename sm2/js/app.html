<html>

<head>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/@rdkit/rdkit/dist/RDKit_minimal.js"></script>
  <script src="/static/controller.js"></script>
  <script src="/static/molecule_draw.js"></script>
  <script src="/static/default_solvent_settings.js"></script>
  <script src="/static/solvent_dialog.js"></script>
</head>

<body>
  <header>
    <img style="display:inline-block;" width="300px" src="/static/hydro_banner.svg">
    <button style=" display:inline-block;" class="secondary" onclick="showKetcher()">
      <div id="current-api">
        draw API
      </div>
    </button>
    <button style=" display:inline-block;" class="secondary" onclick="showSolventsDialog()">solvents</button>
    <div style="display:inline-block;"> | </div>
    <button style=" display:inline-block;" class="primary" onclick="runRanking()">rank</button>
    <button style=" display:inline-block;" class="primary" onclick="runTCurve()">T curve</button>
    <div style="display:inline-block; margin-left: 20px;"></div>
    <button style=" display:inline-block;" class="secondary" onclick="showSettingsModal()">⚙️ Settings</button>
  </header>
  <main>
    <div style="display:inline-block;" id="status-message"></div>
    <div id="main-content" class="grid-container">
    </div>
    
    <!-- Settings Modal -->
    <div class="modal" id="settingsModal" style="display: none;">
      <div style="background-color: white; padding: 20px; border-radius: 8px; width: 400px; margin: 100px auto; border: 1px solid #ccc;">
        <h3>Configuration Settings</h3>
        <p class="infoText">Configure Telemetry and MLOps Providers.</p>
        
        <div style="margin-bottom: 15px;">
          <label><strong>Telemetry Provider:</strong></label><br>
          <select id="telemetryProvider" style="width: 100%; padding: 5px;">
            <option value="local">Local (stdout)</option>
            <option value="pubsub">Google Cloud Pub/Sub</option>
          </select>
        </div>

        <div style="margin-bottom: 15px;">
          <label><strong>MLOps Provider:</strong></label><br>
          <select id="mlopsProvider" style="width: 100%; padding: 5px;">
            <option value="local">Local Checkpoints</option>
            <option value="vertex">Vertex AI Model Registry</option>
          </select>
        </div>

        <div class="buttongroup" style="text-align: right;">
          <button onclick="saveSettings();" class="primary">Save</button>
          <button onclick="hideSettingsModal();" class="secondary">Cancel</button>
        </div>
      </div>
    </div>
    <div class="ketchermodal" id="ketcherModal">
      <iframe id="ifKetcher" src="/static/ketcher/index.html" width="600px" height="600px"></iframe>
      <div class="buttongroup">
        <button onclick="showKetcher();" class="primary">OK</button>
        <!--<button onclick="showKetcher();" class="secondary">Cancel</button>-->
      </div>
    </div>
    <div class="modal" id="solventsDialogModal">
      <p class="infoText">Select one of five freely configurable solvent presets.</p>
      <div class="modalFlex">
        <div id="solvent-settings"></div>
        <div class="buttongroup">
          <button onclick="commitSolventsDialog();" class="primary">OK</button>
          <button onclick="showSolventsDialog();" class="secondary">Cancel</button>
        </div>
      </div>
    </div>
    <div id="modalOuter"></div>
  </main>
  <footer>

  </footer>
</body>

</html>
